# ═══════════════════════════════════════════════════════════════
#  FaceSwap AI — Base Docker Compose
#  Shared config for all environments. Overlays add env-specific
#  settings.
# ═══════════════════════════════════════════════════════════════

services:
  faceswap-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faceswap-backend
    env_file:
      - .env
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./scripts:/app/scripts:ro
    networks:
      - faceswap-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "/app/scripts/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  nginx:
    image: nginx:1.25-alpine
    container_name: faceswap-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      faceswap-backend:
        condition: service_healthy
    networks:
      - faceswap-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

networks:
  faceswap-net:
    driver: bridge