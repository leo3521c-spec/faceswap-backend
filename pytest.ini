# ═══════════════════════════════════════════════════════════════
#  FaceSwap AI Backend — Pytest Configuration
# ═══════════════════════════════════════════════════════════════
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
log_cli = false
log_cli_level = WARNING
addopts = -v --tb=short --strict-markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')