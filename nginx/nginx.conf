# ═══════════════════════════════════════════════════════════════
#  FaceSwap AI — NGINX Reverse Proxy
#  • HTTPS termination (SSL certificates in /etc/nginx/ssl/)
#  • WebSocket proxying for /ws/swap and /ws/voice
#  • Rate limiting for REST API
#  • Health check passthrough
#  • gzip compression
#  • Security headers
# ═══════════════════════════════════════════════════════════════

worker_processes auto;
events {
    worker_connections 2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ──────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               application/xml application/xml+rss text/javascript;

    # ── Rate Limiting ────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=ws:10m   rate=10r/s;

    # ── Upstream ─────────────────────────────────────────────
    upstream faceswap_backend {
        server faceswap-backend:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS Redirect ────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health check endpoint accessible without HTTPS
        location /health {
            proxy_pass http://faceswap_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Server ─────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # ── SSL ──────────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # ── Security Headers ─────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── REST API ─────────────────────────────────────────
        location / {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://faceswap_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ── WebSocket: Face Swap Stream ──────────────────────
        location /ws/swap {
            limit_req zone=ws burst=20 nodelay;

            proxy_pass http://faceswap_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket long-lived connections
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_buffering       off;
        }

        # ── WebSocket: Voice Stream ──────────────────────────
        location /ws/voice {
            limit_req zone=ws burst=20 nodelay;

            proxy_pass http://faceswap_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_buffering       off;
        }

        # ── Health check (no rate limit) ─────────────────────
        location /health {
            proxy_pass http://faceswap_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Metrics (restrict to internal) ───────────────────
        location /metrics {
            # allow 10.0.0.0/8;
            # allow 172.16.0.0/12;
            # allow 192.168.0.0/16;
            # deny all;
            proxy_pass http://faceswap_backend;
            proxy_set_header Host $host;
        }
    }
}